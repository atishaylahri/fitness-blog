name: Generate Weekly Post

on:
  schedule:
    - cron: "0 9 * * 0"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Pause guard (auto-resume 2026-08-02)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%Y%m%d)" -lt "20260802" ]; then
            echo "Paused until 2026-08-02 — 10 weeks of posts pre-generated locally."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install anthropic

      - name: Generate post
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_post.py

      - name: Commit and push new post
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "Gym Stack Bot"
          git config user.email "gymstack-bot@users.noreply.github.com"
          git add content/posts/ topics.txt
          if git diff --staged --quiet; then
            echo "Nothing to commit — topics.txt may be empty."
          else
            git commit -m "Add weekly post $(date +%Y-%m-%d)"
            git push
          fi
